<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Dashboard - JusticeEngine-01</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border-color);
        }
        .dashboard-main {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .escalated-card {
            background: var(--bg-panel);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--accent-danger);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .escalated-card h3 {
            color: var(--accent-danger);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }
        .escalation-reason {
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-left: 3px solid var(--accent-danger);
            margin-bottom: 1rem;
            border-radius: 4px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .case-summary, .ai-summary {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header class="dashboard-header">
        <div class="logo-container" style="flex-direction:row; gap:1rem; padding:0; border:none;">
            <span class="emoji" style="font-size:2rem; margin:0;">🧑‍⚖️</span>
            <div>
                <h1 style="font-size:1.5rem;">Human Judge Dashboard</h1>
                <p class="subtitle">Escalated Cases Review</p>
            </div>
        </div>
        <a href="/" class="btn secondary-btn">Back to Portal</a>
    </header>

    <main class="dashboard-main">
        <h2>Cases Pending Review (<span id="pending-count">0</span>)</h2>
        <p class="subtitle mb-3" style="margin-bottom:2rem;">The following cases were triaged by JusticeEngine-01 but escalated by the user.</p>

        <div id="escalated-list">
            <div class="loading-spinner">Loading escalated cases...</div>
        </div>
    </main>

    <!-- Review Modal -->
    <div id="review-modal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div class="modal-content" style="background:var(--bg-panel); border:1px solid var(--border-color); border-radius:12px; padding:2rem; width:90%; max-width:600px; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
            <h2 style="margin-top:0; color:var(--text-color); margin-bottom:1rem;">Judge's Review: <span id="modal-case-id" style="color:var(--accent-primary);"></span></h2>
            
            <label style="display:block; margin-bottom:0.5rem; font-weight:600; color:var(--muted);">Add Official Comments / Direction</label>
            <textarea id="judge-comments" rows="5" style="width:100%; padding:0.75rem; background:rgba(0,0,0,0.2); border:1px solid var(--border-color); border-radius:6px; color:var(--text-color); font-family:var(--font-family); resize:vertical; margin-bottom:1.5rem;" placeholder="e.g. Reject AI draft; order police to investigate section 315 BNS further."></textarea>
            
            <div style="display:flex; justify-content:flex-end; gap:1rem;">
                <button id="modal-cancel-btn" class="btn secondary-btn">Cancel</button>
                <button id="modal-submit-btn" class="btn primary-btn">Submit Review & Close Case</button>
            </div>
        </div>
    </div>

    <script src="/judge.js"></script>
</body>
</html>
